	<script>
		class Rgb {
			constructor(r, g, b) {
				this.r = r;
				this.g = g;
				this.b = b;
			}
			set(rgb) {
				this.r = rgb.r;
				this.g = rgb.g;
				this.b = rgb.b;
			}
		}

		class Hsv {
			constructor(h, s, v) {
				this.h = h;
				this.s = s;
				this.v = v;
			}
		}

		function convertRgbToHsv(rgb) {
			r = rgb.r / 255;
			g = rgb.g / 255;
			b = rgb.b / 255;
			max = Math.max(r, g, b);
			min = Math.min(r, g, b);

			hsv = new Hsv(0, 0, 0);

			if (max == min) {
				hsv.h = 0;
			}
			else if (r == max) {
				hsv.h = 60 * (g - b) / (max - min);
			}
			else if (g == max) {
				hsv.h = 60 * (2 + (g - b) / (max - min));
			}
			else {
				hsv.h = 60 * (4 + (g - b) / (max - min));
			}
			if (hsv.h < 0) {
				hsv.h += 360;
			}

			if (max == min) {
				hsv.s = 0;
			}
			else {
				hsv.s = 100 * (max - min) / max;
			}

			hsv.v = max * 100;

			hsv.h = Math.floor(hsv.h);
			hsv.v = Math.floor(hsv.v);
			hsv.s = Math.floor(hsv.s);

			return hsv;
		}

		function convertHsvToRgb(hsv) {
			s = hsv.s / 100;
			v = hsv.v / 100;
			hi = Math.floor(hsv.h / 60);
			f = hsv.h / 60 - hi;
			p = v * (1 - s);
			q = v * (1 - s * f);
			t = v * (1 - s * (1 - f));
			switch (hi) {
				case 0:
				case 6:
					return rgbFromNormed(v, t, p);
					break;
				case 1:
					return rgbFromNormed(q, v, p);
					break;
				case 2:
					return rgbFromNormed(p, v, t);
					break;
				case 3:
					return rgbFromNormed(p, q, v);
					break;
				case 4:
					return rgbFromNormed(t, p, v);
					break;
				case 5:
					return rgbFromNormed(v, p, q);
					break;
			}
			return rgb;
		}

		function rgbFromNormed(r, g, b) {
			retRgb = new Rgb(0, 0, 0);
			retRgb.r = Math.floor(r * 255);
			retRgb.g = Math.floor(g * 255);
			retRgb.b = Math.floor(b * 255);
			return retRgb;
		}

		function colorToHex(value) {
			var ret = Number(value).toString(16).toUpperCase();
			if (ret.length == 1) {
				ret = "0" + ret;
			}
			return ret;
		}

		function togglePalette(paletteName) {
			let palette = document.getElementById(paletteName);
			if (palette.style.display == "none") {
				palette.style.display = "table";
			}
			else {
				palette.style.display = "none";
			}
		}


		function initializePalette(paletteName) {
			document.getElementById(paletteName).style.display = "none";
			fillPalette(paletteName);
		}

		function fillPalette(paletteName) {
			let palette = document.getElementById(paletteName);
			for (let i = 0; i < paletteColors.length; ++i) {
				var tr = document.createElement("tr");
				for (let j = 0; j < paletteColors[i].length; ++j) {
					var td = document.createElement("td");
					var button = document.createElement("button");
					button.style.backgroundColor = "#" + paletteColors[i][j];
					button.style.width = "80px";
					button.style.height = "25px";
					button.onclick = function () {
						if (paletteName == "paletteWall") {
							setWallColorFromHexString(paletteColors[i][j]);
						}
						else {
							setWindowColorFromHexString(paletteColors[i][j]);
						}
						document.getElementById(paletteName).style.display = "none";
					};
					td.appendChild(button);
					tr.appendChild(td);
				}
				palette.appendChild(tr);
			}
		}

		wallColorRgb = new Rgb(0, 0, 0);

		function changeWallColorHue(value) {
			wallColorHsv.h = Number(value);
			wallColorRgb = convertHsvToRgb(wallColorHsv);

		function changeWallColorSaturation(value) {

		function setWallColorFromHexString(hexString) {

			wallColorRgb.g = Number("0x" + hexString.substring(2, 4));
			wallColorRgb.b = Number("0x" + hexString.substring(4, 6));

		}

		function originalWallColor() {

		function updateWallColor(updateHsv = true) {
			wallColorNewValue = "rgb(" + wallColorRgb.r + "," + wallColorRgb.g + "," + wallColorRgb.b + ")";

			document.getElementById("streetwallcolor").style.fill = wallColorNewValue;
			document.getElementById("gardenwallcolor").style.fill = wallColorNewValue;
			document.getElementById("setWallColor").style.backgroundColor = wallColorNewValue;

			document.getElementById("wallHex").innerHTML = "#" + colorToHex(wallColorRgb.r) + colorToHex(wallColorRgb.g) + colorToHex(wallColorRgb.b);

			if (updateHsv) {
				wallColorHsv = convertRgbToHsv(wallColorRgb);
				document.getElementById("slideWallHue").value = wallColorHsv.h;
				document.getElementById("slideWallSaturation").value = wallColorHsv.s;
				document.getElementById("slideWallBrightness").value = wallColorHsv.v;
			}
			tempRgbSaturationMin = convertHsvToRgb(new Hsv(wallColorHsv.h, 0, wallColorHsv.v));
			tempRgbSaturationMax = convertHsvToRgb(new Hsv(wallColorHsv.h, 100, wallColorHsv.v));
			document.getElementById("slideWallSaturation").style.background = "linear-gradient(90deg, #" + colorToHex(tempRgbSaturationMin.r) + colorToHex(tempRgbSaturationMin.g) + colorToHex(tempRgbSaturationMin.b) + ", #" + colorToHex(tempRgbSaturationMax.r) + colorToHex(tempRgbSaturationMax.g) + colorToHex(tempRgbSaturationMax.b) + ")";

			tempRgbBrightnessMin = convertHsvToRgb(new Hsv(wallColorHsv.h, wallColorHsv.v, 0));
			tempRgbBrightnessMax = convertHsvToRgb(new Hsv(wallColorHsv.h, wallColorHsv.v, 100));
			document.getElementById("slideWallBrightness").style.background = "linear-gradient(90deg, #" + colorToHex(tempRgbBrightnessMin.r) + colorToHex(tempRgbBrightnessMin.g) + colorToHex(tempRgbBrightnessMin.b) + ", #" + colorToHex(tempRgbBrightnessMax.r) + colorToHex(tempRgbBrightnessMax.g) + colorToHex(tempRgbBrightnessMax.b) + ")";
		}

		windowColorHsv = new Hsv(0, 0, 0);

		originalWindowColor();
